
#Cassandra 4.1


cluster_name: PerfCluster
num_tokens: 256
allocate_tokens_for_local_replication_factor: 3


# ── SEED PROVIDER ────────────────────────────────────────
seed_provider:
  - class_name: org.apache.cassandra.locator.SimpleSeedProvider
    parameters:
      - seeds: "172.20.0.2"

# ── STORAGE ──────────────────────────────────────────────
data_file_directories:
  - /var/lib/cassandra/data
commitlog_directory: /var/lib/cassandra/commitlog
saved_caches_directory: /var/lib/cassandra/saved_caches
hints_directory: /var/lib/cassandra/hints

# ── DISK OPTIMIZATION (critical for EBS gp3) ─────────────
disk_optimization_strategy: ssd
concurrent_reads: 32
concurrent_writes: 32
concurrent_counter_writes: 16
concurrent_materialized_view_writes: 16

# ── ROW CACHE ─────────────────────────────────────────────
row_cache_size_in_mb: 512
row_cache_save_period: 0
row_cache_class_name: org.apache.cassandra.cache.OHCProvider

# ── KEY CACHE ─────────────────────────────────────────────
key_cache_size_in_mb: 256
key_cache_save_period: 14400

# ── COUNTER CACHE ─────────────────────────────────────────
counter_cache_size_in_mb: 64
counter_cache_save_period: 7200

# ── MEMTABLE ──────────────────────────────────────────────
memtable_allocation_type: heap_buffers
memtable_heap_space_in_mb: 1024
memtable_offheap_space_in_mb: 1024

# ── COMPACTION ────────────────────────────────────────────
compaction_throughput_mb_per_sec: 64
concurrent_compactors: 2

# ── COMMITLOG ─────────────────────────────────────────────
commitlog_sync: periodic
commitlog_sync_period_in_ms: 10000
commitlog_segment_size_in_mb: 32
commitlog_compression:
  class_name: LZ4Compressor

# ── NETWORKING ────────────────────────────────────────────
listen_address: 172.20.0.3
rpc_address: 0.0.0.0
broadcast_rpc_address: 172.20.0.3
native_transport_port: 9042
storage_port: 7000
ssl_storage_port: 7001
start_native_transport: true

# ── TIMEOUTS ──────────────────────────────────────────────
read_request_timeout_in_ms: 5000
range_request_timeout_in_ms: 10000
write_request_timeout_in_ms: 2000
counter_write_request_timeout_in_ms: 5000
cas_contention_timeout_in_ms: 1000
truncate_request_timeout_in_ms: 60000
request_timeout_in_ms: 10000

# ── SNITCH ────────────────────────────────────────────────
endpoint_snitch: SimpleSnitch
# For AWS deployment use: Ec2Snitch

# ── PARTITIONER ───────────────────────────────────────────
partitioner: org.apache.cassandra.dht.Murmur3Partitioner

# ── FAILURE DETECTION ─────────────────────────────────────
phi_convict_threshold: 8

# ── INTERNODE COMPRESSION ─────────────────────────────────
internode_compression: dc
inter_dc_tcp_nodelay: false

# ── SSTABLE COMPRESSION DEFAULTS ─────────────────────────
# Overridden per-table in schema.cql
sstable_preemptive_open_interval_in_mb: 50

# ── AUTHENTICATION (disabled) ────────────────
authenticator: AllowAllAuthenticator
authorizer: AllowAllAuthorizer

# ── GC SETTINGS (tuning with jvm.options) ──────────────────
gc_warn_threshold_in_ms: 1000
