
networks:
  cassandra-net:
    driver: bridge

services:
  cassandra-node1:
    image: cassandra:4.1
    container_name: cass-node1
    hostname: cass-node1
    networks:
      - cassandra-net
    ports:
      - "9042:9042"
      - "7199:7199"
    environment:
      - CASSANDRA_CLUSTER_NAME=PerfCluster
      - CASSANDRA_BROADCAST_ADDRESS=cass-node1
      - CASSANDRA_SEEDS=cass-node1
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_NUM_TOKENS=256
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    volumes:
      - cassandra-data1:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "nodetool", "status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  cassandra-node2:
    image: cassandra:4.1
    container_name: cass-node2
    hostname: cass-node2
    networks:
      - cassandra-net
    environment:
      - CASSANDRA_CLUSTER_NAME=PerfCluster
      - CASSANDRA_BROADCAST_ADDRESS=cass-node2
      - CASSANDRA_SEEDS=cass-node1
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_NUM_TOKENS=256
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    volumes:
      - cassandra-data2:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "nodetool", "status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      cassandra-node1:
        condition: service_started

  cassandra-node3:
    image: cassandra:4.1
    container_name: cass-node3
    hostname: cass-node3
    networks:
      - cassandra-net
    environment:
      - CASSANDRA_CLUSTER_NAME=PerfCluster
      - CASSANDRA_BROADCAST_ADDRESS=cass-node3
      - CASSANDRA_SEEDS=cass-node1
      - CASSANDRA_DC=datacenter1
      - CASSANDRA_RACK=rack1
      - CASSANDRA_NUM_TOKENS=256
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    volumes:
      - cassandra-data3:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "nodetool", "status"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    depends_on:
      cassandra-node2:
        condition: service_started

volumes:
  cassandra-data1:
  cassandra-data2:
  cassandra-data3:
